name: ✨ 功能请求
description: 为已支持的设备请求新功能
body:
  - type: textarea
    attributes:
      label: 功能描述
      description: 请描述你希望添加的功能
    validations:
      required: true

  - type: textarea
    attributes:
      label: 问题背景
      description: 这个功能要解决什么问题？
    validations:
      required: true

  - type: textarea
    attributes:
      label: 建议的解决方案
      description: 你希望这个功能如何工作？
    validations:
      required: true

  - type: input
    attributes:
      label: Home Assistant 版本
      placeholder: "如：2025.12.4"

  - type: input
    attributes:
      label: 集成版本
      placeholder: "如：v26.3.0"

  - type: input
    attributes:
      label: 设备品牌
      placeholder: "如：美的、小天鹅"
    validations:
      required: true

  - type: input
    attributes:
      label: 设备类型
      placeholder: "如：空调"
    validations:
      required: true

  - type: input
    attributes:
      label: 设备型号
      placeholder: "如：KFR-35GW/N8MJA3"
    validations:
      required: true

  - type: textarea
    attributes:
      label: 设备发现日志
      description: |
        在 `configuration.yaml` 中添加：
        ```yaml
        logger:
          logs:
            custom_components.midea_smart_home: debug
        ```
        然后尝试添加设备或复现功能相关操作，粘贴日志
      render: shell
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: 功能确认
      options:
        - label: 我确认我的设备支持这个功能（可通过美的官方 App 验证）
          required: true
        - label: 我可以提供设备的调试信息
          required: false

  - type: checkboxes
    attributes:
      label: 检查清单
      options:
        - label: 我已经搜索了现有的 issues
          required: true
        - label: 我愿意协助测试这个功能
          required: false
