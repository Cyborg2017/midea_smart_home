name: Auto Version Bump

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git hooks for Gerrit compliance
        run: |
          cat > .git/hooks/commit-msg << 'EOF'
          #!/bin/bash
          COMMIT_MSG_FILE="$1"
          if [ -z "$COMMIT_MSG_FILE" ]; then
              COMMIT_MSG_FILE=".git/COMMIT_EDITMSG"
          fi

          # Add Change-Id if not exists
          if ! grep -q '^Change-Id:' "$COMMIT_MSG_FILE"; then
              ID=$(git var GIT_AUTHOR_IDENT | git hash-object --stdin)
              CHANGE_ID="I$(echo "$ID" | cut -c1-40)"
              echo "" >> "$COMMIT_MSG_FILE"
              echo "Change-Id: $CHANGE_ID" >> "$COMMIT_MSG_FILE"
          fi
          EOF
          chmod +x .git/hooks/commit-msg

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Check if there are new commits since last version bump
        id: check_commits
        run: |
          latest_commit_message=$(git log --oneline -1 --format=%B)
          echo "Latest commit message: $latest_commit_message"
          
          if echo "$latest_commit_message" | grep -q "^chore: bump version to"; then
              echo "Latest commit is a version bump, skipping release"
              echo "::set-output name=has_new_commits::false"
          else
              echo "Found new commits since last version bump"
              echo "::set-output name=has_new_commits::true"
          fi

      - name: Format code with format_code.py
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          python scripts/format_code.py

      - name: Commit format changes
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          git config user.name "Cyborg2017"
          git config user.email "cyborg2017@users.noreply.github.com"
          git add -u
          git diff --cached --quiet || git commit -m "style: format Python code with format_code.py script"

      - name: Sort translations with sort_translations.py
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          python scripts/sort_translations.py

      - name: Commit translation changes
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          git config user.name "Cyborg2017"
          git config user.email "cyborg2017@users.noreply.github.com"
          git add -u
          git diff --cached --quiet || git commit -m "style: sort translation and icon JSON files alphabetically"

      - name: Bump version
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: bump
        run: |
          import json
          from datetime import datetime
          
          with open('custom_components/midea_smart_home/manifest.json', 'r') as f:
              manifest = json.load(f)
          
          current_version = manifest['version']
          current_year, current_month, current_patch = map(int, current_version.split('.'))
          
          now = datetime.now()
          current_year_in_version = now.year % 100
          current_month_in_version = now.month
          
          if current_year == current_year_in_version and current_month == current_month_in_version:
              new_patch = current_patch + 1
              new_version = f"{current_year}.{current_month}.{new_patch}"
          else:
              new_version = f"{current_year_in_version}.{current_month_in_version}.0"
          
          manifest['version'] = new_version
          
          with open('custom_components/midea_smart_home/manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
              f.write('\n')
          
          print(f"::set-output name=new_version::{new_version}")
        shell: python

      - name: Generate changelog
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: changelog
        run: |
          import subprocess
          import re
          from datetime import datetime
          
          tags_result = subprocess.run(
              ['git', 'tag', '-l', '--sort=-v:refname', 'v*'],
              capture_output=True,
              text=True
          )
          tags = [t for t in tags_result.stdout.strip().split('\n') if t]
          prev_version = tags[0] if tags else None
          
          result = subprocess.run(
              ['git', 'log', '--oneline', '--format=%s', '-50'],
              capture_output=True,
              text=True
          )
          
          commits = result.stdout.strip().split('\n')
          
          categorized = {
              'feat': [],
              'fix': [],
              'style': [],
              'chore': [],
              'docs': [],
              'refactor': [],
              'test': [],
              'other': []
          }
          
          for commit in commits:
              if not commit.strip():
                  continue
              if commit.startswith('chore: bump version'):
                  break
              
              match = re.match(r'^(\w+)(?:\([^)]+\))?:\s*(.*)', commit)
              if match:
                  category = match.group(1)
                  message = match.group(2)
                  if category in categorized:
                      categorized[category].append(message)
                  else:
                      categorized['other'].append(commit)
              else:
                  categorized['other'].append(commit)
          
          changelog = f"🎉 v${{steps.bump.outputs.new_version}}\n\n"
          
          category_labels = {
              'feat': '✨ New Features',
              'fix': '🔧 Bug Fixes',
              'style': '🎨 Code Style',
              'chore': '📦 Chores',
              'docs': '📝 Documentation',
              'refactor': '🔄 Refactor',
              'test': '🧪 Tests',
              'other': '📋 Other'
          }
          
          for cat, label in category_labels.items():
              if categorized[cat]:
                  changelog += f"{label}\n"
                  for item in categorized[cat]:
                      changelog += f"- {item}\n"
                  changelog += "\n"
          
          if prev_version:
              changelog += f"**Full Changelog**: [{prev_version}...v${{steps.bump.outputs.new_version}}](https://github.com/Cyborg2017/midea_smart_home/compare/{prev_version}...v${{steps.bump.outputs.new_version}})\n\n"
          changelog += "🔒 Auto-generated by GitHub Actions\n"
          
          with open('RELEASE_CHANGELOG.md', 'w') as f:
              f.write(changelog)
          
          print(f"::set-output name=changelog::{changelog}")
        shell: python

      - name: Commit and push changes
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          git config user.name "Cyborg2017"
          git config user.email "cyborg2017@users.noreply.github.com"
          git add custom_components/midea_smart_home/manifest.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create tag
        if: steps.check_commits.outputs.has_new_commits == 'true'
        run: |
          git tag v${{ steps.bump.outputs.new_version }}
          git push origin v${{ steps.bump.outputs.new_version }}

      - name: Read changelog file
        if: steps.check_commits.outputs.has_new_commits == 'true'
        id: read_changelog
        run: |
          changelog=$(cat RELEASE_CHANGELOG.md)
          changelog="${changelog//'%'/'%25'}"
          changelog="${changelog//$'\n'/'%0A'}"
          changelog="${changelog//$'\r'/'%0D'}"
          echo "::set-output name=content::$changelog"

      - name: Create release
        if: steps.check_commits.outputs.has_new_commits == 'true'
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          release_name: v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.read_changelog.outputs.content }}
          draft: false
          prerelease: false

      - name: Delete all prereleases
        if: steps.check_commits.outputs.has_new_commits == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          import subprocess
          import json
          import os
          
          token = os.environ['GH_TOKEN']
          
          # Get all prerelease releases
          result = subprocess.run(
              ['gh', 'api', '/repos/Cyborg2017/midea_smart_home/releases',
               '--jq', '.[] | select(.prerelease == true) | {id, tag_name}'],
              capture_output=True,
              text=True,
              env={'GITHUB_TOKEN': token}
          )
          
          if result.stdout.strip():
              releases = []
              for line in result.stdout.strip().split('\n'):
                  if line.strip():
                      releases.append(json.loads(line))
              for rel in releases:
                  print(f"Deleting prerelease: {rel['tag_name']}")
                  # Delete release
                  subprocess.run(
                      ['gh', 'api', '-X', 'DELETE',
                       f'/repos/Cyborg2017/midea_smart_home/releases/{rel["id"]}'],
                      env={'GITHUB_TOKEN': token}
                  )
                  # Delete tag locally and remote
                  subprocess.run(['git', 'tag', '-d', rel['tag_name']],
                                 capture_output=True)
                  subprocess.run(
                      ['git', 'push', 'origin', '--delete', rel['tag_name']],
                      env={'GITHUB_TOKEN': token},
                      capture_output=True
                  )
              print(f"Deleted {len(releases)} prerelease(s)")
          else:
              print("No prereleases found")
        shell: python